services:
  backend:
    build: ./backend
    container_name: braillescript-backend
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    container_name: braillescript-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
